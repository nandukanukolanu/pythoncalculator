<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Calculator</h1>
            </div>
            
            <div class="display">
                <input type="text" id="display" readonly placeholder="0">
            </div>
            
            <div class="buttons">
                <button class="btn btn-function" onclick="appendToDisplay('(')">（</button>
                <button class="btn btn-function" onclick="appendToDisplay(')')">）</button>
                <button class="btn btn-function" onclick="clearDisplay()">C</button>
                <button class="btn btn-function" onclick="deleteLastChar()">⌫</button>
                
                <button class="btn btn-number" onclick="appendToDisplay('7')">7</button>
                <button class="btn btn-number" onclick="appendToDisplay('8')">8</button>
                <button class="btn btn-number" onclick="appendToDisplay('9')">9</button>
                <button class="btn btn-operator" onclick="appendToDisplay('/')">÷</button>
                
                <button class="btn btn-number" onclick="appendToDisplay('4')">4</button>
                <button class="btn btn-number" onclick="appendToDisplay('5')">5</button>
                <button class="btn btn-number" onclick="appendToDisplay('6')">6</button>
                <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>
                
                <button class="btn btn-number" onclick="appendToDisplay('1')">1</button>
                <button class="btn btn-number" onclick="appendToDisplay('2')">2</button>
                <button class="btn btn-number" onclick="appendToDisplay('3')">3</button>
                <button class="btn btn-operator" onclick="appendToDisplay('-')">−</button>
                
                <button class="btn btn-number btn-zero" onclick="appendToDisplay('0')">0</button>
                <button class="btn btn-number" onclick="appendToDisplay('.')">.</button>
                <button class="btn btn-operator" onclick="calculatePercentage()">%</button>
                <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>
                
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header">
                <h2>History</h2>
                <button class="clear-history-btn" onclick="clearHistory()">Clear</button>
            </div>
            <div class="history-list" id="history">
                <p class="empty-history">No calculations yet</p>
            </div>
        </div>
    </div>

    <script>
        const displayInput = document.getElementById('display');
        const historyContainer = document.getElementById('history');

        // Load background color configuration
        function loadBackgroundColor() {
            fetch('/config', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                document.body.style.background = data.backgroundColor;
            })
            .catch(error => console.error('Error loading config:', error));
        }

        function appendToDisplay(value) {
            if (displayInput.value === '0' && value !== '.') {
                displayInput.value = value;
            } else {
                displayInput.value += value;
            }
        }

        function clearDisplay() {
            displayInput.value = '0';
        }

        function deleteLastChar() {
            displayInput.value = displayInput.value.slice(0, -1);
            if (displayInput.value === '') {
                displayInput.value = '0';
            }
        }

        function calculate() {
            const expression = displayInput.value;
            
            if (expression === '0' || expression === '') {
                return;
            }

            fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ expression: expression })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    displayInput.value = 'Error';
                } else {
                    displayInput.value = data.result;
                    updateHistory();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                displayInput.value = 'Error';
            });
        }

        function calculatePercentage() {
            const value = displayInput.value;
            
            if (!value || value === '0') {
                return;
            }

            fetch('/percentage', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ value: value })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    displayInput.value = 'Error';
                } else {
                    displayInput.value = data.result;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                displayInput.value = 'Error';
            });
        }

        function updateHistory() {
            fetch('/history', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                const history = data.history;
                if (history.length === 0) {
                    historyContainer.innerHTML = '<p class="empty-history">No calculations yet</p>';
                } else {
                    historyContainer.innerHTML = history.map(item => `
                        <div class="history-item" onclick="displayResult('${item.result}')">
                            <div class="history-expression">${item.expression}</div>
                            <div class="history-result">${item.result}</div>
                        </div>
                    `).join('');
                }
            })
            .catch(error => console.error('Error:', error));
        }

        function displayResult(result) {
            displayInput.value = result;
        }

        function clearHistory() {
            historyContainer.innerHTML = '<p class="empty-history">No calculations yet</p>';
        }

        // Load config and history on page load
        window.addEventListener('load', () => {
            loadBackgroundColor();
            updateHistory();
        });

        // Allow keyboard input
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (key >= '0' && key <= '9') {
                appendToDisplay(key);
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendToDisplay(key);
            } else if (key === '.' || key === ',') {
                appendToDisplay('.');
            } else if (key === 'Enter') {
                event.preventDefault();
                calculate();
            } else if (key === 'Backspace') {
                event.preventDefault();
                deleteLastChar();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === '(' || key === ')') {
                appendToDisplay(key);
            } else if (key === '%') {
                event.preventDefault();
                calculatePercentage();
            }
        });
    </script>
</body>
</html>
